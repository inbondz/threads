<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inbondz Threads</title>
    <link rel="icon" href="favicon.svg" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-white: #FFFFFF;
            --border-light: #EFF3F4;
            --text-main: #0F1419;
            --text-muted: #536471;
            --inbondz-brand: #9EA3A3;
            --action-blue: #1D9BF0;
            --gold: #F9A826;
            --grey: #828282;
            --hover-bg: #F7F9F9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-white); color: var(--text-main); display: flex; justify-content: center; overscroll-behavior-y: none; overflow-x: hidden; width: 100vw; }

        /* --- STRICT ROUTING VIEWS --- */
        .view-section { display: none !important; width: 100%; }
        .view-section.active { display: block !important; }
        .view-section.active-flex { display: flex !important; }

        /* --- APP CONTAINER --- */
        .app-container { width: 100%; max-width: 1000px; margin: 0 auto; border-left: 1px solid var(--border-light); border-right: 1px solid var(--border-light); min-height: 100vh; position: relative; background: var(--bg-white); display: flex; flex-direction: column; }

        /* --- HEADER & TOP NAV --- */
        .feed-header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); padding: 16px 16px 0 16px; border-bottom: 1px solid var(--border-light); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .brand-title { font-family: 'Carter One', cursive; font-size: 24px; color: var(--inbondz-brand); cursor: pointer; letter-spacing: 0.5px; text-decoration: none; display: flex; align-items: center; }
        .back-btn { background: none; border: none; font-size: 16px; font-weight: 600; color: var(--text-main); cursor: pointer; display: flex; align-items: center;}
        .back-btn svg { width: 24px; height: 24px; margin-right: 8px; }

        .category-nav { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border-light); margin: 0 -16px; padding: 0 16px; }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn { background: none; border: none; padding: 12px 16px; font-size: 15px; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: 0.2s; }
        .cat-btn.active { color: var(--text-main); border-bottom: 3px solid var(--action-blue); }

        /* --- FEED & POSTS --- */
        .feed-content { flex: 1; padding-bottom: 80px; }
        .thread-post { display: flex; padding: 16px; border-bottom: 1px solid var(--border-light); transition: background 0.2s; cursor: pointer; word-wrap: break-word; overflow-wrap: anywhere; }
        .thread-post:hover { background-color: var(--hover-bg); }

        .avatar { width: 44px; height: 44px; border-radius: 50%; background-color: var(--text-main); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; margin-right: 12px; flex-shrink: 0; cursor: pointer; }
        .post-content { flex-grow: 1; min-width: 0; }
        .user-meta { display: flex; align-items: center; font-size: 15px; margin-bottom: 4px; flex-wrap: wrap;}
        .username { font-weight: 600; cursor: pointer; }
        .username:hover { text-decoration: underline; }
        .timestamp { color: var(--text-muted); font-size: 14px; margin-left: 4px; }
        .badge-wrapper { display: inline-flex; align-items: center; cursor: pointer; margin-left: 4px; }
        
        .story-title { font-size: 16px; line-height: 1.5; color: var(--text-main); text-decoration: none; display: block; font-weight: 600;}
        .story-domain { display: inline-flex; align-items: center; font-size: 13px; color: var(--action-blue); margin-top: 4px; text-decoration: none; word-break: break-all;}
        .story-domain svg { margin-right: 4px; flex-shrink: 0;}

        .hn-text { font-size: 14px; line-height: 1.5; color: var(--text-main); margin-top: 8px; }
        .hn-text p { margin-bottom: 8px; }
        .hn-text a { color: var(--action-blue) !important; text-decoration: none !important; word-break: break-all !important; }
        .hn-text a:hover { text-decoration: underline !important; }
        .hn-text pre { background: var(--hover-bg); padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; max-width: 100%; border: 1px solid var(--border-light);}

        .poll-container { margin-top: 12px; border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden; }
        .poll-opt { padding: 12px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; font-size: 14px; background: var(--hover-bg);}
        .poll-score { font-weight: 600; color: var(--action-blue); white-space: nowrap; margin-left: 10px;}
        .job-tag { display: inline-block; background: var(--text-main); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; font-weight: 600; text-transform: uppercase;}

        .post-actions { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap;}
        .action-btn { display: flex; align-items: center; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: color 0.2s; padding: 4px 0;}
        .action-btn svg { margin-right: 6px; }
        .action-btn:hover { color: var(--action-blue); }
        .parent-btn { font-weight: 500; }

        .comment-block { padding: 12px 16px 12px 0; border-bottom: 1px solid var(--border-light); border-left: 2px solid transparent; }
        .comment-block.nested { margin-left: 16px; border-left: 2px solid var(--border-light); padding-left: 12px; border-bottom: none;}

        /* --- PROFILE VIEW & SHARE BTN --- */
        .profile-header { padding: 30px 16px; border-bottom: 1px solid var(--border-light); text-align: center; }
        .profile-avatar-large { width: 80px; height: 80px; border-radius: 50%; background: var(--text-main); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; margin: 0 auto 16px; }
        .profile-name { font-size: 20px; font-weight: 600; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; flex-wrap: wrap;}
        .profile-stats { font-size: 15px; color: var(--text-muted); margin-bottom: 16px; }
        .profile-about { font-size: 14px; line-height: 1.5; text-align: left; background: var(--hover-bg); padding: 16px; border-radius: 12px; word-wrap: break-word; overflow-wrap: anywhere;}
        
        .share-profile-btn {
            background: var(--bg-white); color: var(--text-main); border: 1px solid var(--border-light);
            padding: 8px 20px; border-radius: 999px; font-weight: 600; font-size: 14px; cursor: pointer;
            transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; margin-top: 16px;
        }
        .share-profile-btn:hover { background: var(--hover-bg); border-color: var(--inbondz-brand); }

        /* --- SPLIT CHAT BAR --- */
        .chat-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 1000px; background: var(--bg-white); border-top: 1px solid var(--border-light); padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); display: flex; align-items: center; z-index: 100; }
        .chat-input { flex-grow: 1; background: var(--hover-bg); border: 1px solid var(--border-light); padding: 14px 20px; border-radius: 999px; font-size: 15px; outline: none; color: var(--text-main); transition: border-color 0.2s; width: 100%; }
        .chat-input:focus { border-color: var(--inbondz-brand); background: var(--bg-white); }
        .chat-submit { background: var(--text-main); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
        .chat-submit:hover { opacity: 0.8; }
        .btn-submit-url { margin-right: 12px; background: var(--hover-bg); color: var(--text-main); border: 1px solid var(--border-light); margin-left: 0; }
        .btn-search { margin-left: 12px; }

        .loader { padding: 40px; text-align: center; color: var(--inbondz-brand); font-weight: 500; font-size: 15px;}
        .load-more-btn { background: var(--text-main); color: white; padding: 14px 32px; border: none; border-radius: 999px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%; max-width: 300px; }
        .load-more-btn:hover { opacity: 0.8; }

        /* --- BULLETPROOF BOTTOM SHEET --- */
        .bottom-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .bottom-sheet-overlay.active { opacity: 1; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; width: 100%; max-width: 1000px; background: var(--bg-white); border-radius: 24px 24px 0 0; padding: 24px 24px 40px; z-index: 2001; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1); box-shadow: 0 -4px 25px rgba(0,0,0,0.15); text-align: center; }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-grabber { width: 40px; height: 5px; background: #D1D5DB; border-radius: 10px; margin: 0 auto 24px; }
        .sheet-icon { margin-bottom: 16px; display: flex; justify-content: center; align-items: center;}
        .sheet-title { font-family: 'Carter One', cursive; font-size: 22px; color: var(--text-main); margin-bottom: 8px; }
        .sheet-desc { font-size: 15px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; padding: 0 10px;}
        .sheet-btn { width: 100%; background: var(--text-main); color: white; border: none; padding: 16px; border-radius: 999px; font-weight: 600; font-size: 16px; cursor: pointer; }

        /* --- 404 STRICT ISOLATION (No Hamburger, No Donate) --- */
        .view-404-container { width: 100%; flex-direction: column; min-height: 100vh; background: var(--bg-white); align-items: center; }
        .error-header { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-light); }
        .error-logo { font-family: "Carter One", cursive; font-size: 28px; color: var(--inbondz-brand); text-decoration: none; letter-spacing: 0.5px; }
        .error-content-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .error-code { font-family: "Carter One", cursive; font-size: 80px; color: var(--border-light); margin-bottom: 16px; line-height: 1; }
        .error-msg { color: var(--text-muted); margin-bottom: 32px; font-size: 18px; max-width: 300px; line-height: 1.5;}
        .btn-return { display: inline-block; background: var(--text-main); color: white; text-decoration: none; padding: 16px 32px; border-radius: 999px; font-weight: 600; font-size: 16px; border: none; cursor: pointer;}
        @media (max-width: 768px) { .error-header { padding: 16px 20px; } }
    </style>
</head>
<body>

    <div id="view-app" class="view-section">
        <div class="app-container">
            <header class="feed-header">
                <div class="header-top">
                    <div id="dynamic-header">
                        <a href="javascript:void(0)" onclick="loadFeed('topstories')" class="brand-title">Inbondz Threads</a>
                    </div>
                </div>
                
                <div id="categoryNav" class="category-nav">
                    <button class="cat-btn active" id="btn-topstories" onclick="loadFeed('topstories')">Top</button>
                    <button class="cat-btn" id="btn-newstories" onclick="loadFeed('newstories')">New</button>
                    <button class="cat-btn" id="btn-askstories" onclick="loadFeed('askstories')">Ask</button>
                    <button class="cat-btn" id="btn-showstories" onclick="loadFeed('showstories')">Show</button>
                    <button class="cat-btn" id="btn-jobstories" onclick="loadFeed('jobstories')">Jobs</button>
                </div>
            </header>

            <main id="content" class="feed-content">
                <div class="loader">Initializing Edge Network...</div>
            </main>

            <nav class="chat-bar">
                <button class="chat-submit btn-submit-url" onclick="openSheet(null, 'network', 'submit')" title="Submit to Network">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <input type="text" id="globalInput" class="chat-input" placeholder="Search the network..." onkeydown="if(event.key === 'Enter') handleSearchAction()">
                <button onclick="handleSearchAction()" class="chat-submit btn-search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </nav>
        </div>
    </div>

    <div id="view-404" class="view-section view-404-container">
        <header class="error-header">
            <a href="https://threads.inbondz.com" class="error-logo">Inbondz</a>
        </header>
        <div class="error-content-wrapper">
            <div class="error-code">404</div>
            <p class="error-msg">This directory does not exist on the Inbondz network.</p>
            <button onclick="window.location.href='https://threads.inbondz.com'" class="btn-return">Return to Threads</button>
        </div>
    </div>

    <div id="sheetOverlay" class="bottom-sheet-overlay" onclick="closeSheet()"></div>
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sheet-grabber"></div>
        <div id="sheetIcon" class="sheet-icon"></div>
        <h3 id="sheetTitle" class="sheet-title">Verification</h3>
        <p id="sheetDesc" class="sheet-desc"></p>
        <button id="sheetBtn" class="sheet-btn">View Profile</button>
    </div>

    <script>
        const API = 'https://hacker-news.firebaseio.com/v0';
        const ALGOLIA = 'https://hn.algolia.com/api/v1';
        
        const SVG_VERIFIED = `<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:text-bottom;">
            <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z" fill="{COLOR}"></path>
        </svg>`;
        const TICK_BLUE = SVG_VERIFIED.replace('{COLOR}', 'var(--action-blue)');
        const TICK_GOLD = SVG_VERIFIED.replace('{COLOR}', 'var(--gold)');
        const TICK_GREY = SVG_VERIFIED.replace('{COLOR}', 'var(--grey)');

        const SVG_LARGE = SVG_VERIFIED.replace('width="18"', 'width="48"').replace('height="18"', 'height="48"');
        const TICK_BLUE_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--action-blue)');
        const TICK_GOLD_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--gold)');
        const TICK_GREY_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--grey)');
        
        const ICON_UPVOTE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
        const ICON_COMMENT = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`;
        const ICON_LINK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`;
        const ICON_PARENT = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>`;
        const ICON_SHARE = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>`;

        let currentStoryIds = [];
        let currentLoadedIndex = 0;
        const BATCH_SIZE = 15;

        function autoLink(htmlString) {
            if (!htmlString) return '';
            const temp = document.createElement('div');
            temp.innerHTML = htmlString;
            temp.querySelectorAll('a').forEach(a => { a.setAttribute('target', '_blank'); });

            const urlRegex = /(https?:\/\/[^\s<]+)/g;
            const walker = document.createTreeWalker(temp, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while(node = walker.nextNode()) textNodes.push(node);

            textNodes.forEach(n => {
                if(n.parentNode.tagName === 'A' || n.parentNode.tagName === 'PRE' || n.parentNode.tagName === 'CODE') return;
                if(urlRegex.test(n.nodeValue)) {
                    const span = document.createElement('span');
                    span.innerHTML = n.nodeValue.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
                    n.parentNode.replaceChild(span, n);
                }
            });
            return temp.innerHTML;
        }

        const userCache = new Map();
        async function fetchUser(username) {
            if(!username) return null;
            if(userCache.has(username)) return userCache.get(username);
            try {
                const res = await fetch(`${API}/user/${username}.json`);
                const user = await res.json();
                if(user) userCache.set(username, user);
                return user;
            } catch(e) { return null; }
        }

        async function getBadge(username) {
            if(username === 'inbondz' || username === 'wasimsk') {
                return `<span class="badge-wrapper" onclick="openSheet(event, 'core', '${username}')">${TICK_BLUE} <img src="https://www.inbondz.com/favicon.png" style="width:14px;height:14px;margin-left:4px;border-radius:4px;"></span>`;
            }
            const user = await fetchUser(username);
            if(!user) return '';
            if(user.karma >= 5000) return `<span class="badge-wrapper" onclick="openSheet(event, 5000, '${username}')">${TICK_GREY}</span>`;
            if(user.karma >= 1000) return `<span class="badge-wrapper" onclick="openSheet(event, 1000, '${username}')">${TICK_GOLD}</span>`;
            if(user.karma >= 100) return `<span class="badge-wrapper" onclick="openSheet(event, 100, '${username}')">${TICK_BLUE}</span>`;
            return '';
        }

        function openSheet(e, type, payload) {
            if(e) e.stopPropagation();
            const overlay = document.getElementById('sheetOverlay');
            const sheet = document.getElementById('bottomSheet');
            document.getElementById('sheetIcon').innerHTML = ''; 
            
            if (type === 'core') {
                document.getElementById('sheetIcon').innerHTML = `<div style="display:flex; align-items:center; gap:12px;">${TICK_BLUE_LARGE} <img src="https://www.inbondz.com/favicon.png" style="width:48px;height:48px;border-radius:8px;"></div>`;
                document.getElementById('sheetTitle').innerText = "Verified Core Team";
                document.getElementById('sheetDesc').innerText = "Verified by Inbondz. You are viewing an official Inbondz affiliated profile.";
                document.getElementById('sheetBtn').innerText = "View Profile";
                document.getElementById('sheetBtn').onclick = () => { closeSheet(); viewProfile(payload); };
            } else if (typeof type === 'number') {
                document.getElementById('sheetIcon').innerHTML = (type === 5000) ? TICK_GREY_LARGE : (type === 1000) ? TICK_GOLD_LARGE : TICK_BLUE_LARGE;
                document.getElementById('sheetTitle').innerText = "Verified Account";
                document.getElementById('sheetDesc').innerText = `Verified as the profile has ${type}+ karma.`;
                document.getElementById('sheetBtn').innerText = "View Profile";
                document.getElementById('sheetBtn').onclick = () => { closeSheet(); viewProfile(payload); };
            } else if (type === 'network') {
                document.getElementById('sheetIcon').innerHTML = `<h1 style="font-family:'Carter One'; color:var(--inbondz-brand); font-size:40px; margin:0; line-height:1;">YC</h1>`;
                document.getElementById('sheetTitle').innerText = "Network Gateway";
                document.getElementById('sheetDesc').innerText = "To finalize your submission or vote, you will be securely routed through the official YC authentication layer.";
                document.getElementById('sheetBtn').innerText = "Acknowledge & Proceed";
                document.getElementById('sheetBtn').onclick = () => { 
                    closeSheet(); 
                    if (payload === 'submit') window.open(`https://news.ycombinator.com/submit`, '_blank');
                    else window.open(`https://news.ycombinator.com/item?id=${payload}`, '_blank'); 
                };
            }

            overlay.style.display = 'block';
            void overlay.offsetWidth; 
            overlay.classList.add('active');
            sheet.classList.add('active');
        }

        function closeSheet() {
            document.getElementById('sheetOverlay').classList.remove('active');
            document.getElementById('bottomSheet').classList.remove('active');
            setTimeout(() => { document.getElementById('sheetOverlay').style.display = 'none'; }, 350); 
        }

        function updateURL(paramKey, paramValue) {
            const url = new URL(window.location);
            url.search = ''; 
            url.searchParams.set(paramKey, paramValue);
            window.history.pushState({}, '', url);
        }

        function setHeader(title, showNav = false, showBack = false) {
            document.getElementById('categoryNav').style.display = showNav ? 'flex' : 'none';
            if (showBack) {
                document.getElementById('dynamic-header').innerHTML = `<button class="back-btn" onclick="loadFeed('topstories')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> ${title}</button>`;
            } else {
                document.getElementById('dynamic-header').innerHTML = `<a href="javascript:void(0)" onclick="loadFeed('topstories')" class="brand-title">Inbondz Threads</a>`;
            }
            window.scrollTo(0,0);
        }

        async function loadFeed(type = 'topstories', skipHistory = false) {
            if(!skipHistory) updateURL('feed', type);
            setHeader('Inbondz Threads', true, false);
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${type}`)) document.getElementById(`btn-${type}`).classList.add('active');
            
            document.getElementById('content').innerHTML = '<div class="loader">Synchronizing Edge Network...</div>';
            document.getElementById('globalInput').value = '';
            try {
                const res = await fetch(`${API}/${type}.json`);
                currentStoryIds = await res.json();
                currentLoadedIndex = 0;
                document.getElementById('content').innerHTML = ''; 
                await loadNextBatch();
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Network Error. Please try again.</div>'; }
        }

        async function loadNextBatch() {
            const existingBtn = document.getElementById('load-more-container');
            if (existingBtn) existingBtn.remove();

            const batchIds = currentStoryIds.slice(currentLoadedIndex, currentLoadedIndex + BATCH_SIZE);
            if(batchIds.length === 0) return;

            document.getElementById('content').insertAdjacentHTML('beforeend', '<div id="batch-loader" class="loader">Fetching...</div>');

            try {
                const items = await Promise.all(batchIds.map(id => fetch(`${API}/item/${id}.json`).then(r=>r.json())));
                await Promise.all(items.filter(i=>i && i.by).map(i => fetchUser(i.by)));
                const html = await Promise.all(items.map(renderCard));
                
                const loader = document.getElementById('batch-loader');
                if(loader) loader.remove();
                
                document.getElementById('content').insertAdjacentHTML('beforeend', html.join(''));
                currentLoadedIndex += BATCH_SIZE;

                if (currentLoadedIndex < currentStoryIds.length) {
                    const btnHtml = `<div id="load-more-container" style="padding: 30px; display: flex; justify-content: center;"><button onclick="loadNextBatch()" class="load-more-btn">See More Threads</button></div>`;
                    document.getElementById('content').insertAdjacentHTML('beforeend', btnHtml);
                }
            } catch(e) {
                const loader = document.getElementById('batch-loader');
                if(loader) loader.remove();
                document.getElementById('content').insertAdjacentHTML('beforeend', '<div class="loader">Error fetching next batch.</div>');
            }
        }

        async function renderCard(item) {
            if (!item || item.deleted || item.dead) return '';
            const badge = await getBadge(item.by);
            const initial = item.by ? item.by.charAt(0).toUpperCase() : '?';
            const hours = Math.floor((Date.now()/1000 - item.time) / 3600);
            
            let extraHTML = '';
            let contextHTML = '';
            let targetId = item.id;

            if (item.type === 'comment' && item.parent) {
                targetId = item.parent; 
                try {
                    const parentRes = await fetch(`${API}/item/${item.parent}.json`);
                    const parentData = await parentRes.json();
                    if (parentData && parentData.by) {
                        contextHTML = `<div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                            Replying to <span style="color: var(--action-blue); cursor: pointer; margin-left: 4px; font-weight: 500;" onclick="event.stopPropagation(); viewProfile('${parentData.by}')">@${parentData.by}</span>
                        </div>`;
                    }
                } catch(e) {}
            }

            let displayTitle = item.title ? `<div class="story-title">${item.title}</div>` : '';
            if (item.type === 'comment' && item.title) {
                displayTitle = `<div class="story-title" style="margin-bottom: 6px;"><span style="color: var(--action-blue); font-weight: 500;">Thread:</span> ${item.title}</div>`;
            }

            if (item.text) extraHTML += `<div class="hn-text">${autoLink(item.text)}</div>`;
            if (item.type === 'poll' && item.parts) {
                const opts = await Promise.all(item.parts.map(p => fetch(`${API}/item/${p}.json`).then(r=>r.json())));
                extraHTML += `<div class="poll-container">` + opts.map(o => `<div class="poll-opt"><span>${o.text}</span> <span class="poll-score">${o.score || 0} pts</span></div>`).join('') + `</div>`;
            }

            let domain = '';
            if (item.url) { try { domain = new URL(item.url).hostname.replace('www.',''); } catch(e){} }

            let parentBtnHTML = '';
            if (item.parent) {
                parentBtnHTML = `<button class="action-btn parent-btn" onclick="event.stopPropagation(); loadThread(${item.parent})">${ICON_PARENT} Parent</button>`;
            }

            return `
                <div class="thread-post" onclick="loadThread(${targetId})">
                    <div class="avatar" onclick="event.stopPropagation(); viewProfile('${item.by}')">${initial}</div>
                    <div class="post-content">
                        ${contextHTML}
                        <div class="user-meta">
                            <span class="username" onclick="event.stopPropagation(); viewProfile('${item.by}')">${item.by}</span>
                            ${badge} <span class="timestamp">· ${hours}h</span>
                        </div>
                        ${item.type === 'job' ? '<span class="job-tag">Hiring</span>' : ''}
                        ${displayTitle}
                        ${domain ? `<a href="${item.url}" target="_blank" class="story-domain" onclick="event.stopPropagation()">${ICON_LINK} ${domain}</a>` : ''}
                        ${extraHTML}
                        ${item.type !== 'job' ? `
                        <div class="post-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${item.id})">${ICON_UPVOTE} ${item.score || 0}</button>
                            <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${item.id})">${ICON_COMMENT} ${item.descendants || 0}</button>
                            ${parentBtnHTML}
                        </div>` : ''}
                    </div>
                </div>
            `;
        }

        async function loadThread(id, skipHistory = false) {
            if(!skipHistory) updateURL('item', id);
            setHeader('Thread', false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Loading discussion...</div>';
            try {
                const res = await fetch(`${ALGOLIA}/items/${id}`);
                const data = await res.json();
                
                const storyFormat = { 
                    id: data.id, by: data.author, time: data.created_at_i, 
                    title: data.title || data.story_title, text: data.text, url: data.url, score: data.points, 
                    descendants: data.children ? data.children.length : 0, type: data.type, parent: data.parent_id 
                };
                
                let html = await renderCard(storyFormat);
                html += `<div style="padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border-light);">Comments</div>`;
                
                if (data.children && data.children.length > 0) {
                    const commentsHtml = await Promise.all(data.children.map(c => renderCommentNode(c, 0)));
                    html += commentsHtml.join('');
                } else {
                    html += '<div class="loader">No comments yet.</div>';
                }
                document.getElementById('content').innerHTML = html;
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Failed to load thread.</div>'; }
        }

        async function renderCommentNode(node, depth) {
            if (!node || !node.text) return '';
            const badge = await getBadge(node.author);
            let html = `
                <div class="comment-block ${depth > 0 ? 'nested' : ''}">
                    <div class="user-meta" style="font-size: 13px;">
                        <span class="username" onclick="viewProfile('${node.author}')">${node.author}</span>
                        ${badge}
                    </div>
                    <div class="hn-text">${autoLink(node.text)}</div>
                    <div class="post-actions" style="max-width: 150px; margin-top: 8px;">
                        <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${node.id})">${ICON_UPVOTE}</button>
                        <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${node.id})">${ICON_COMMENT}</button>
                    </div>
                </div>
            `;
            if (node.children && depth < 3) {
                const kidsHtml = await Promise.all(node.children.map(c => renderCommentNode(c, depth + 1)));
                html += kidsHtml.join('');
            }
            return html;
        }

        function copyProfileUrl(username) {
            const url = `https://threads.inbondz.com/?profile=${username}`;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('shareProfileBtn');
                const originalContent = btn.innerHTML;
                btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
                btn.style.borderColor = "var(--action-blue)";
                btn.style.color = "var(--action-blue)";
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.style.borderColor = "var(--border-light)";
                    btn.style.color = "var(--text-main)";
                }, 2000);
            });
        }

        async function viewProfile(username, skipHistory = false) {
            if(!username || username === 'undefined') return;
            if(!skipHistory) updateURL('profile', username);
            setHeader('Profile', false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Retrieving profile...</div>';
            
            const user = await fetchUser(username);
            if(!user) { document.getElementById('content').innerHTML = '<div class="loader">Profile not found.</div>'; return; }

            const badge = await getBadge(username);
            const date = new Date(user.created * 1000).toLocaleDateString();

            let html = `
                <div class="profile-header">
                    <div class="profile-avatar-large">${username.charAt(0).toUpperCase()}</div>
                    <div class="profile-name">${username} ${badge}</div>
                    <div class="profile-stats">Joined ${date} · <strong>${user.karma}</strong> Karma</div>
                    ${user.about ? `<div class="profile-about hn-text">${autoLink(user.about)}</div>` : ''}
                    <button id="shareProfileBtn" class="share-profile-btn" onclick="copyProfileUrl('${username}')">
                        ${ICON_SHARE} Share Profile
                    </button>
                </div>
                <div style="padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border-light);">Network Submissions</div>
                <div id="profile-feed"><div class="loader">Loading history...</div></div>
            `;
            document.getElementById('content').innerHTML = html;

            if(user.submitted && user.submitted.length > 0) {
                try {
                    const res = await fetch(`${ALGOLIA}/search_by_date?tags=author_${username}&hitsPerPage=15`);
                    const data = await res.json();
                    
                    const mappedItems = data.hits.map(h => ({
                        id: h.objectID, by: h.author, time: h.created_at_i, 
                        title: h.title || h.story_title, text: h.comment_text || h.story_text, 
                        url: h.url || h.story_url, score: h.points || 0, descendants: h.num_comments || 0, 
                        type: h._tags && h._tags.includes('comment') ? 'comment' : 'story', parent: h.parent_id
                    }));
                    
                    const feedHtml = await Promise.all(mappedItems.map(renderCard));
                    document.getElementById('profile-feed').innerHTML = feedHtml.length ? feedHtml.join('') : '<div class="loader">No visible activity.</div>';
                } catch (e) {
                    document.getElementById('profile-feed').innerHTML = '<div class="loader">Error loading network activity.</div>';
                }
            } else {
                document.getElementById('profile-feed').innerHTML = '<div class="loader">No network activity.</div>';
            }
        }

        async function handleSearch(query, skipHistory = false) {
            if(!skipHistory) updateURL('search', query);
            setHeader(`Search: ${query}`, false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Querying index...</div>';
            try {
                const res = await fetch(`${ALGOLIA}/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                await Promise.all(data.hits.map(h => fetchUser(h.author)));
                
                const mappedItems = data.hits.map(h => ({
                    id: h.objectID, by: h.author, time: h.created_at_i, 
                    title: h.title || h.story_title, text: h.comment_text || h.story_text, 
                    url: h.url || h.story_url, score: h.points || 0, descendants: h.num_comments || 0, 
                    type: h._tags && h._tags.includes('comment') ? 'comment' : 'story', parent: h.parent_id
                }));
                const html = await Promise.all(mappedItems.map(renderCard));
                document.getElementById('content').innerHTML = html.length ? html.join('') : '<div class="loader">No results found on the network.</div>';
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Search failed.</div>'; }
        }

        function handleSearchAction() {
            const val = document.getElementById('globalInput').value.trim();
            if(!val) return;
            if (val.startsWith('@')) {
                const username = val.substring(1); 
                viewProfile(username);
                document.getElementById('globalInput').value = '';
                return;
            }
            handleSearch(val);
        }

        // --- STRICT ROUTER LOGIC ---
        function router() {
            const path = window.location.pathname;
            const validPaths = ['/', '/index.html'];

            if (validPaths.includes(path)) {
                // Show Main App, Hide 404
                document.getElementById('view-app').classList.add('active');
                document.getElementById('view-404').classList.remove('active-flex');

                // Process Query Parameters normally
                const params = new URLSearchParams(window.location.search);
                if (params.has('profile')) viewProfile(params.get('profile'), true);
                else if (params.has('item')) loadThread(params.get('item'), true);
                else if (params.has('search')) {
                    document.getElementById('globalInput').value = params.get('search');
                    handleSearch(params.get('search'), true);
                }
                else if (params.has('feed')) loadFeed(params.get('feed'), true);
                else loadFeed('topstories', true);
            } else {
                // Anything not explicitly valid triggers the Strict 404
                document.getElementById('view-404').classList.add('active-flex');
                document.getElementById('view-app').classList.remove('active');
            }
        }

        window.addEventListener('popstate', router);
        router(); 
    </script>
</body>
