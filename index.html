<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inbondz Threads</title>
    <link rel="icon" href="https://www.inbondz.com/favicon.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-white: #FFFFFF;
            --border-light: #EFF3F4;
            --text-main: #0F1419;
            --text-muted: #536471;
            --inbondz-brand: #9EA3A3;
            --action-blue: #1D9BF0;
            --gold: #F9A826;
            --grey: #828282;
            --hover-bg: #F7F9F9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-white); color: var(--text-main);
            display: flex; justify-content: center;
            overscroll-behavior-y: none;
            overflow-x: hidden;
            width: 100vw;
        }

        /* --- STRICT ROUTING VIEWS --- */
        .view-section { display: none !important; width: 100%; }
        .view-section.active { display: block !important; }
        .view-section.active-flex { display: flex !important; }

        /* --- APP CONTAINER --- */
        .app-container {
            width: 100%; max-width: 600px; margin: 0 auto;
            border-left: 1px solid var(--border-light); border-right: 1px solid var(--border-light);
            min-height: 100vh; position: relative;
            background: var(--bg-white);
            display: flex; flex-direction: column;
        }

        /* --- HEADER & TOP NAV --- */
        .feed-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 16px 16px 0 16px; border-bottom: 1px solid var(--border-light);
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        
        .brand-title {
            font-family: 'Carter One', cursive; font-size: 24px;
            color: var(--inbondz-brand); cursor: pointer; letter-spacing: 0.5px;
            text-decoration: none; display: flex; align-items: center;
        }

        .back-btn { background: none; border: none; font-size: 16px; font-weight: 600; color: var(--text-main); cursor: pointer; display: flex; align-items: center;}
        .back-btn svg { width: 24px; height: 24px; margin-right: 8px; }

        /* X-Style Scrollable Categories */
        .category-nav {
            display: flex; overflow-x: auto; scrollbar-width: none;
            border-bottom: 1px solid var(--border-light); margin: 0 -16px; padding: 0 16px;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: none; border: none; padding: 12px 16px; font-size: 15px;
            font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap;
            border-bottom: 3px solid transparent; transition: 0.2s;
        }
        .cat-btn.active { color: var(--text-main); border-bottom: 3px solid var(--action-blue); }

        /* --- FEED & POSTS --- */
        .feed-content { flex: 1; padding-bottom: 80px; }
        
        .thread-post {
            display: flex; padding: 16px; border-bottom: 1px solid var(--border-light);
            transition: background 0.2s; cursor: pointer; word-wrap: break-word; overflow-wrap: anywhere;
        }
        .thread-post:hover { background-color: var(--hover-bg); }

        .avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background-color: var(--text-main); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 18px; margin-right: 12px; flex-shrink: 0; cursor: pointer;
        }

        .post-content { flex-grow: 1; min-width: 0; }
        .user-meta { display: flex; align-items: center; font-size: 15px; margin-bottom: 4px; flex-wrap: wrap;}
        .username { font-weight: 600; cursor: pointer; }
        .username:hover { text-decoration: underline; }
        .timestamp { color: var(--text-muted); font-size: 14px; margin-left: 4px; }
        .badge-wrapper { display: inline-flex; align-items: center; cursor: pointer; margin-left: 4px; }
        
        .story-title { font-size: 15px; line-height: 1.5; color: var(--text-main); text-decoration: none; display: block; font-weight: 500;}
        .story-domain { display: inline-flex; align-items: center; font-size: 13px; color: var(--action-blue); margin-top: 4px; text-decoration: none; word-break: break-all;}
        .story-domain svg { margin-right: 4px; flex-shrink: 0;}

        .hn-text { font-size: 14px; line-height: 1.5; color: var(--text-main); margin-top: 8px; }
        .hn-text a { color: var(--action-blue); text-decoration: none; word-break: break-all;}
        .hn-text p { margin-bottom: 8px; }
        .hn-text pre { background: var(--hover-bg); padding: 8px; border-radius: 8px; overflow-x: auto; font-size: 12px; max-width: 100%;}

        .job-tag { display: inline-block; background: var(--text-main); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; font-weight: 600; text-transform: uppercase;}

        .post-actions { display: flex; justify-content: space-between; max-width: 400px; margin-top: 12px; }
        .action-btn { display: flex; align-items: center; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: color 0.2s; padding: 4px 0;}
        .action-btn svg { margin-right: 6px; }
        .action-btn:hover { color: var(--action-blue); }

        /* --- COMMENTS TREE --- */
        .comment-block { padding: 12px 16px 12px 0; border-bottom: 1px solid var(--border-light); border-left: 2px solid transparent; }
        .comment-block.nested { margin-left: 16px; border-left: 2px solid var(--border-light); padding-left: 12px; border-bottom: none;}

        /* --- PROFILE VIEW --- */
        .profile-header { padding: 30px 16px; border-bottom: 1px solid var(--border-light); text-align: center; }
        .profile-avatar-large { width: 80px; height: 80px; border-radius: 50%; background: var(--text-main); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; margin: 0 auto 16px; }
        .profile-name { font-size: 20px; font-weight: 600; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; flex-wrap: wrap;}
        .profile-stats { font-size: 15px; color: var(--text-muted); margin-bottom: 16px; }
        .profile-about { font-size: 14px; line-height: 1.5; text-align: left; background: var(--hover-bg); padding: 16px; border-radius: 12px; word-wrap: break-word; overflow-wrap: anywhere;}

        /* --- FOOTER (Inbondz.com Exact Copy) --- */
        footer { border-top: 1px solid var(--border-light); padding: 32px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-white); flex-wrap: wrap; gap: 20px; margin-bottom: 60px;}
        .footer-copy { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .footer-copy span { font-family: "Carter One", cursive; color: var(--inbondz-brand); font-size: 16px; }
        .social-links { display: flex; gap: 20px; align-items: center; }
        .social-links a { color: var(--text-main); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .social-links a:hover { color: var(--inbondz-brand); transform: translateY(-2px); }
        .social-icon { width: 22px; height: 22px; fill: currentcolor; }

        /* --- CHAT BAR --- */
        .chat-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 600px;
            background: var(--bg-white); border-top: 1px solid var(--border-light);
            padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; align-items: center; z-index: 100;
        }
        .chat-input {
            flex-grow: 1; background: var(--hover-bg); border: 1px solid var(--border-light);
            padding: 14px 20px; border-radius: 999px; font-size: 15px; outline: none; color: var(--text-main);
            transition: border-color 0.2s; width: 100%;
        }
        .chat-input:focus { border-color: var(--inbondz-brand); background: var(--bg-white); }
        .chat-submit {
            background: var(--text-main); color: white; border: none;
            width: 44px; height: 44px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; margin-left: 12px; cursor: pointer; flex-shrink: 0;
        }

        .loader { padding: 40px; text-align: center; color: var(--inbondz-brand); font-weight: 500; font-size: 15px;}

        /* --- BULLETPROOF BOTTOM SHEET --- */
        .bottom-sheet-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .bottom-sheet-overlay.active { opacity: 1; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; width: 100%; max-width: 600px; background: var(--bg-white); border-radius: 24px 24px 0 0; padding: 24px 24px 40px; z-index: 2001; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1); box-shadow: 0 -4px 25px rgba(0,0,0,0.15); text-align: center; }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-grabber { width: 40px; height: 5px; background: #D1D5DB; border-radius: 10px; margin: 0 auto 24px; }
        .sheet-icon { margin-bottom: 16px; display: flex; justify-content: center; align-items: center;}
        .sheet-title { font-family: 'Carter One', cursive; font-size: 22px; color: var(--text-main); margin-bottom: 8px; }
        .sheet-desc { font-size: 15px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; padding: 0 10px;}
        .sheet-btn { width: 100%; background: var(--text-main); color: white; border: none; padding: 16px; border-radius: 999px; font-weight: 600; font-size: 16px; cursor: pointer; }

        /* --- 404 STRICT ISOLATION --- */
        .view-404-container { width: 100%; flex-direction: column; min-height: 100vh; background: var(--bg-white);}
        .error-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-light); }
        .hamburger-container { justify-self: start; }
        .hamburger { display: flex; flex-direction: column; gap: 6px; cursor: pointer; width: 28px; }
        .hamburger span { width: 100%; height: 2px; background: var(--text-main); }
        .error-logo { justify-self: center; font-family: "Carter One", cursive; font-size: 28px; color: var(--inbondz-brand); text-decoration: none; letter-spacing: 0.5px; }
        .header-action { justify-self: end; }
        .btn-top { background: var(--text-main); color: #fff; padding: 10px 24px; border-radius: 100px; text-decoration: none; font-size: 14px; font-weight: 500; border: 1px solid var(--text-main); white-space: nowrap; }
        .error-content-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .error-code { font-family: "Carter One", cursive; font-size: 80px; color: var(--border-light); margin-bottom: 16px; line-height: 1; }
        .error-msg { color: var(--text-muted); margin-bottom: 32px; font-size: 18px; max-width: 300px; line-height: 1.5;}
        .btn-return { display: inline-block; background: var(--text-main); color: white; text-decoration: none; padding: 16px 32px; border-radius: 999px; font-weight: 600; font-size: 16px; }
        @media (max-width: 768px) { .error-header { padding: 16px 20px; } }
    </style>
</head>
<body>

    <div id="view-app" class="view-section">
        <div class="app-container">
            
            <header class="feed-header">
                <div class="header-top">
                    <div id="dynamic-header">
                        <a href="javascript:void(0)" onclick="loadFeed('topstories')" class="brand-title">Inbondz Threads</a>
                    </div>
                </div>
                
                <div id="categoryNav" class="category-nav">
                    <button class="cat-btn active" id="btn-topstories" onclick="loadFeed('topstories')">Top</button>
                    <button class="cat-btn" id="btn-newstories" onclick="loadFeed('newstories')">New</button>
                    <button class="cat-btn" id="btn-askstories" onclick="loadFeed('askstories')">Ask</button>
                    <button class="cat-btn" id="btn-showstories" onclick="loadFeed('showstories')">Show</button>
                    <button class="cat-btn" id="btn-jobstories" onclick="loadFeed('jobstories')">Jobs</button>
                </div>
            </header>

            <main id="content" class="feed-content">
                <div class="loader">Initializing Edge Network...</div>
            </main>

            <footer>
                <div class="footer-copy">© <span>Inbondz</span>. Architecting the Edge.</div>
                <div class="social-links">

            </footer>

            <nav class="chat-bar">
                <input type="text" id="globalInput" class="chat-input" placeholder="Search threads, or submit URL..." onkeydown="if(event.key === 'Enter') handleGlobalAction()">
                <button onclick="handleGlobalAction()" class="chat-submit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </nav>
        </div>
    </div>

    <div id="view-404" class="view-section view-404-container">
        <header class="error-header">
            <div class="hamburger-container"><div class="hamburger"><span></span><span></span><span></span></div></div>
            <a href="https://threads.inbondz.com" class="error-logo">Inbondz</a>
            <div class="header-action"><a href="https://donate.inbondz.com/" class="btn-top">Donate</a></div>
        </header>
        <div class="error-content-wrapper">
            <div class="error-code">404</div>
            <p class="error-msg">This directory does not exist on the Inbondz network.</p>
            <a href="https://threads.inbondz.com" class="btn-return">Return to Threads</a>
        </div>
    </div>

    <div id="sheetOverlay" class="bottom-sheet-overlay" onclick="closeSheet()"></div>
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sheet-grabber"></div>
        <div id="sheetIcon" class="sheet-icon"></div>
        <h3 id="sheetTitle" class="sheet-title">Verification</h3>
        <p id="sheetDesc" class="sheet-desc"></p>
        <button id="sheetBtn" class="sheet-btn">View Profile</button>
    </div>

    <script>
        // --- STRICT ROUTER ---
        const currentPath = window.location.pathname;
        if (currentPath.endsWith('404.html')) {
            document.getElementById('view-404').classList.add('active-flex');
        } else {
            document.getElementById('view-app').classList.add('active');
        }

        // --- API CONFIG & UNKILLABLE SVGs ---
        const API = 'https://hacker-news.firebaseio.com/v0';
        const ALGOLIA = 'https://hn.algolia.com/api/v1';
        
        // Solid Circular Checkmark - Mathematically impossible to break
        const SVG_VERIFIED = `<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:text-bottom;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="{COLOR}"/></svg>`;
        const TICK_BLUE = SVG_VERIFIED.replace('{COLOR}', 'var(--action-blue)');
        const TICK_GOLD = SVG_VERIFIED.replace('{COLOR}', 'var(--gold)');
        const TICK_GREY = SVG_VERIFIED.replace('{COLOR}', 'var(--grey)');

        const SVG_LARGE = SVG_VERIFIED.replace('width="18"', 'width="48"').replace('height="18"', 'height="48"');
        const TICK_BLUE_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--action-blue)');
        const TICK_GOLD_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--gold)');
        const TICK_GREY_LARGE = SVG_LARGE.replace('{COLOR}', 'var(--grey)');
        
        const ICON_UPVOTE = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
        const ICON_COMMENT = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`;
        const ICON_LINK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`;

        const userCache = new Map();

        async function fetchUser(username) {
            if(!username) return null;
            if(userCache.has(username)) return userCache.get(username);
            try {
                const res = await fetch(`${API}/user/${username}.json`);
                const user = await res.json();
                if(user) userCache.set(username, user);
                return user;
            } catch(e) { return null; }
        }

        async function getBadge(username) {
            // HARD WIPE: Check for Inbondz FIRST to prevent Karma Overlap
            if(username === 'inbondz' || username === 'rwasimsk') {
                return `<span class="badge-wrapper" onclick="openSheet(event, 'core', '${username}')">${TICK_BLUE} <img src="https://www.inbondz.com/favicon.png" style="width:14px;height:14px;margin-left:4px;border-radius:4px;"></span>`;
            }
            
            // Standard Karma Processing
            const user = await fetchUser(username);
            if(!user) return '';
            if(user.karma >= 5000) return `<span class="badge-wrapper" onclick="openSheet(event, 5000, '${username}')">${TICK_GREY}</span>`;
            if(user.karma >= 1000) return `<span class="badge-wrapper" onclick="openSheet(event, 1000, '${username}')">${TICK_GOLD}</span>`;
            if(user.karma >= 100) return `<span class="badge-wrapper" onclick="openSheet(event, 100, '${username}')">${TICK_BLUE}</span>`;
            return '';
        }

        // --- Bottom Sheet UI ---
        function openSheet(e, type, payload) {
            if(e) e.stopPropagation();
            const overlay = document.getElementById('sheetOverlay');
            const sheet = document.getElementById('bottomSheet');
            
            document.getElementById('sheetIcon').innerHTML = ''; // reset
            
            if (type === 'core') {
                document.getElementById('sheetIcon').innerHTML = `<img src="https://www.inbondz.com/favicon.png" style="width:48px;height:48px;border-radius:8px;">`;
                document.getElementById('sheetTitle').innerText = "Verified Core Team";
                document.getElementById('sheetDesc').innerText = "Verified by Inbondz. You are viewing an official Inbondz affiliated profile.";
                document.getElementById('sheetBtn').innerText = "View Profile";
                document.getElementById('sheetBtn').onclick = () => { closeSheet(); viewProfile(payload); };
            } 
            else if (typeof type === 'number') {
                document.getElementById('sheetIcon').innerHTML = (type === 5000) ? TICK_GREY_LARGE : (type === 1000) ? TICK_GOLD_LARGE : TICK_BLUE_LARGE;
                document.getElementById('sheetTitle').innerText = "Verified Account";
                document.getElementById('sheetDesc').innerText = `Verified as the profile has ${type}+ karma.`;
                document.getElementById('sheetBtn').innerText = "View Profile";
                document.getElementById('sheetBtn').onclick = () => { closeSheet(); viewProfile(payload); };
            } 
            else if (type === 'network') {
                document.getElementById('sheetIcon').innerHTML = `<h1 style="font-family:'Carter One'; color:var(--inbondz-brand); font-size:40px; margin:0; line-height:1;">YC</h1>`;
                document.getElementById('sheetTitle').innerText = "Network Gateway";
                document.getElementById('sheetDesc').innerText = "To finalize your submission or vote, you will be securely routed through the official YC authentication layer.";
                document.getElementById('sheetBtn').innerText = "Acknowledge & Proceed";
                document.getElementById('sheetBtn').onclick = () => { closeSheet(); window.open(`https://news.ycombinator.com/item?id=${payload}`, '_blank'); };
            }

            overlay.style.display = 'block';
            void overlay.offsetWidth; 
            overlay.classList.add('active');
            sheet.classList.add('active');
        }

        function closeSheet() {
            document.getElementById('sheetOverlay').classList.remove('active');
            document.getElementById('bottomSheet').classList.remove('active');
            setTimeout(() => { document.getElementById('sheetOverlay').style.display = 'none'; }, 350); 
        }

        // --- Core Render Engine ---
        function setHeader(title, showNav = false, showBack = false) {
            document.getElementById('categoryNav').style.display = showNav ? 'flex' : 'none';
            if (showBack) {
                document.getElementById('dynamic-header').innerHTML = `<button class="back-btn" onclick="loadFeed('topstories')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> ${title}</button>`;
            } else {
                document.getElementById('dynamic-header').innerHTML = `<a href="javascript:void(0)" onclick="loadFeed('topstories')" class="brand-title">Inbondz Threads</a>`;
            }
            window.scrollTo(0,0);
        }

        async function loadFeed(type = 'topstories') {
            setHeader('Inbondz Threads', true, false);
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            
            document.getElementById('content').innerHTML = '<div class="loader">Synchronizing Edge Network...</div>';
            document.getElementById('globalInput').value = '';
            try {
                const res = await fetch(`${API}/${type}.json`);
                const ids = await res.json();
                const items = await Promise.all(ids.slice(0, 15).map(id => fetch(`${API}/item/${id}.json`).then(r=>r.json())));
                await Promise.all(items.filter(i=>i && i.by).map(i => fetchUser(i.by)));
                const html = await Promise.all(items.map(renderCard));
                document.getElementById('content').innerHTML = html.join('');
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Network Error. Please try again.</div>'; }
        }

        async function renderCard(item) {
            if (!item || item.deleted || item.dead) return '';
            const badge = await getBadge(item.by);
            const initial = item.by ? item.by.charAt(0).toUpperCase() : '?';
            const hours = Math.floor((Date.now()/1000 - item.time) / 3600);
            
            let extraHTML = '';
            if (item.text) extraHTML += `<div class="hn-text">${item.text}</div>`;
            if (item.type === 'poll' && item.parts) {
                const opts = await Promise.all(item.parts.map(p => fetch(`${API}/item/${p}.json`).then(r=>r.json())));
                extraHTML += `<div class="poll-container">` + opts.map(o => `<div class="poll-opt"><span>${o.text}</span> <span class="poll-score">${o.score || 0} pts</span></div>`).join('') + `</div>`;
            }

            let domain = '';
            if (item.url) { try { domain = new URL(item.url).hostname.replace('www.',''); } catch(e){} }

            // Clicking the body of the post loads the deep thread.
            return `
                <div class="thread-post" onclick="loadThread(${item.id})">
                    <div class="avatar" onclick="event.stopPropagation(); viewProfile('${item.by}')">${initial}</div>
                    <div class="post-content">
                        <div class="user-meta">
                            <span class="username" onclick="event.stopPropagation(); viewProfile('${item.by}')">${item.by}</span>
                            ${badge} <span class="timestamp">· ${hours}h</span>
                        </div>
                        ${item.type === 'job' ? '<span class="job-tag">Hiring</span>' : ''}
                        ${item.title ? `<div class="story-title">${item.title}</div>` : ''}
                        ${domain ? `<a href="${item.url}" target="_blank" class="story-domain" onclick="event.stopPropagation()">${ICON_LINK} ${domain}</a>` : ''}
                        ${extraHTML}
                        ${item.type !== 'job' ? `
                        <div class="post-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${item.id})">${ICON_UPVOTE} ${item.score || 0}</button>
                            <button class="action-btn" onclick="event.stopPropagation(); openSheet(null, 'network', ${item.id})">${ICON_COMMENT} ${item.descendants || 0}</button>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }

        // --- Deep Thread (Comments) Engine ---
        async function loadThread(id) {
            setHeader('Thread', false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Loading discussion...</div>';
            try {
                // Algolia deep fetch gets the entire comment tree instantly
                const res = await fetch(`${ALGOLIA}/items/${id}`);
                const data = await res.json();
                
                // Map it to Firebase structure for renderCard
                const storyFormat = { id: data.id, by: data.author, time: data.created_at_i, title: data.title, text: data.text, url: data.url, score: data.points, descendants: data.children.length, type: data.type };
                
                let html = await renderCard(storyFormat);
                html += `<div style="padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border-light);">Comments</div>`;
                
                if (data.children && data.children.length > 0) {
                    const commentsHtml = await Promise.all(data.children.map(c => renderCommentNode(c, 0)));
                    html += commentsHtml.join('');
                } else {
                    html += '<div class="loader">No comments yet.</div>';
                }
                
                document.getElementById('content').innerHTML = html;
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Failed to load thread.</div>'; }
        }

        async function renderCommentNode(node, depth) {
            if (!node || !node.text) return '';
            const badge = await getBadge(node.author);
            let html = `
                <div class="comment-block ${depth > 0 ? 'nested' : ''}">
                    <div class="user-meta" style="font-size: 13px;">
                        <span class="username" onclick="viewProfile('${node.author}')">${node.author}</span>
                        ${badge}
                    </div>
                    <div class="hn-text">${node.text}</div>
                </div>
            `;
            // Limit depth to prevent mobile freezing on massive threads
            if (node.children && depth < 3) {
                const kidsHtml = await Promise.all(node.children.map(c => renderCommentNode(c, depth + 1)));
                html += kidsHtml.join('');
            }
            return html;
        }

        // --- Profile UI ---
        async function viewProfile(username) {
            if(!username || username === 'undefined') return;
            setHeader('Profile', false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Retrieving profile...</div>';
            
            const user = await fetchUser(username);
            if(!user) { document.getElementById('content').innerHTML = '<div class="loader">Profile not found.</div>'; return; }

            const badge = await getBadge(username);
            const date = new Date(user.created * 1000).toLocaleDateString();

            let html = `
                <div class="profile-header">
                    <div class="profile-avatar-large">${username.charAt(0).toUpperCase()}</div>
                    <div class="profile-name">${username} ${badge}</div>
                    <div class="profile-stats">Joined ${date} · <strong>${user.karma}</strong> Karma</div>
                    ${user.about ? `<div class="profile-about hn-text">${user.about}</div>` : ''}
                </div>
                <div style="padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border-light);">Network Submissions</div>
                <div id="profile-feed"><div class="loader">Loading history...</div></div>
            `;
            document.getElementById('content').innerHTML = html;

            if(user.submitted && user.submitted.length > 0) {
                const items = await Promise.all(user.submitted.slice(0, 10).map(id => fetch(`${API}/item/${id}.json`).then(r=>r.json())));
                const feedHtml = await Promise.all(items.map(renderCard));
                document.getElementById('profile-feed').innerHTML = feedHtml.join('');
            } else {
                document.getElementById('profile-feed').innerHTML = '<div class="loader">No network activity.</div>';
            }
        }

        // --- Search ---
        async function handleSearch(query) {
            setHeader(`Search: ${query}`, false, true);
            document.getElementById('content').innerHTML = '<div class="loader">Querying index...</div>';
            try {
                const res = await fetch(`${ALGOLIA}/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                await Promise.all(data.hits.map(h => fetchUser(h.author)));
                
                const mappedItems = data.hits.map(h => ({
                    id: h.objectID, by: h.author, time: h.created_at_i, title: h.title || h.story_title, text: h.comment_text, url: h.url, score: h.points, descendants: h.num_comments, type: h._tags.includes('comment') ? 'comment' : 'story'
                }));
                const html = await Promise.all(mappedItems.map(renderCard));
                document.getElementById('content').innerHTML = html.length ? html.join('') : '<div class="loader">No results found on the network.</div>';
            } catch(e) { document.getElementById('content').innerHTML = '<div class="loader">Search failed.</div>'; }
        }

        function handleGlobalAction() {
            const val = document.getElementById('globalInput').value.trim();
            if(!val) return;
            if(val.startsWith('http://') || val.startsWith('https://')) {
                window.open(`https://news.ycombinator.com/submitlink?u=${encodeURIComponent(val)}`, '_blank');
            } else {
                handleSearch(val);
            }
            document.getElementById('globalInput').value = '';
        }

        // Boot
        if (!currentPath.endsWith('404.html')) loadFeed('topstories');
    </script>
</body>
</html>
